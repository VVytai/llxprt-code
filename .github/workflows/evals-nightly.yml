name: Evals Nightly

on:
  schedule:
    - cron: '0 2 * * *' # Run at 2 AM UTC daily
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: 'evals-nightly-${{ github.ref }}'
  cancel-in-progress: false

jobs:
  evals:
    name: Run Evals
    uses: ./.github/workflows/_evals-run.yml
    secrets:
      provider-api-key: ${{ secrets[vars.KEY_VAR_NAME] }}

  aggregate-results:
    name: Aggregate Results
    needs: [evals]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # ratchet:actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download all artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # ratchet:actions/download-artifact@v5
        with:
          path: artifacts

      - name: Aggregate and output results
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: node scripts/aggregate_evals.js artifacts >> "$GITHUB_STEP_SUMMARY"
