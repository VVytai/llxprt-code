name: Reusable Behavioral Evals

on:
  workflow_call:
    inputs:
      run-attempts:
        description: 'JSON array of matrix run attempt identifiers'
        required: false
        type: string
        default: '[1, 2, 3]'
    secrets:
      provider-api-key:
        description: >-
          The resolved provider API key, passed by the caller under the fixed
          input name provider-api-key (callers resolve the configured secret).
        required: true

permissions:
  contents: read

jobs:
  evals:
    name: Run Evals (Attempt ${{ matrix.run_attempt }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        run_attempt: ${{ fromJSON(inputs.run-attempts) }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # ratchet:actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # ratchet:oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: Install dependencies
        run: npm ci

      - name: Create logs directory
        run: mkdir -p evals/logs

      - name: Provider configuration preflight
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.provider-api-key }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          KEY_VAR_NAME: ${{ vars.KEY_VAR_NAME }}
          LLXPRT_DEFAULT_MODEL: ${{ vars.LLXPRT_DEFAULT_MODEL }}
          LLXPRT_DEFAULT_PROVIDER: ${{ vars.LLXPRT_DEFAULT_PROVIDER }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::OPENAI_API_KEY (secret named by KEY_VAR_NAME) is required for real-model evals"
            missing=1
          fi
          if [ -z "${OPENAI_BASE_URL:-}" ]; then
            echo "::error::OPENAI_BASE_URL repository variable is required for real-model evals"
            missing=1
          fi
          if [ -z "${LLXPRT_DEFAULT_MODEL:-}" ]; then
            echo "::error::LLXPRT_DEFAULT_MODEL repository variable is required for real-model evals"
            missing=1
          fi
          if [ -z "${LLXPRT_DEFAULT_PROVIDER:-}" ]; then
            echo "::error::LLXPRT_DEFAULT_PROVIDER repository variable is required for real-model evals"
            missing=1
          fi
          # Report which key variable was consulted (name only, never the value).
          echo "Consulted API key secret named: ${KEY_VAR_NAME:-<unset>}"
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "All required provider configuration values are present."

      - name: Build project
        run: npm run build

      - name: Run all evals
        env:
          OPENAI_API_KEY: ${{ secrets.provider-api-key }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          LLXPRT_DEFAULT_MODEL: ${{ vars.LLXPRT_DEFAULT_MODEL }}
          LLXPRT_DEFAULT_PROVIDER: ${{ vars.LLXPRT_DEFAULT_PROVIDER }}
          LLXPRT_AUTH_TYPE: provider
          LLXPRT_FORCE_FILE_STORAGE: 'true'
          RUN_EVALS: '1'
        run: npm run test:all_evals

      - name: Prepare eval artifact
        id: prepare
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          # Always create the staging directory and copy whatever logs exist
          # so the artifact upload succeeds even when report.json is missing
          # (eval crashed before the JSON reporter ran). When report.json is
          # absent, a diagnostic marker is written so post-mortem debugging is
          # possible, and the job still fails via a later step that checks the
          # report_present output.
          rm -rf eval-artifact
          mkdir -p eval-artifact
          cp -a evals/logs/. eval-artifact/ 2>/dev/null || true
          if [ ! -f evals/logs/report.json ]; then
            printf '%s\n' \
              'evals/logs/report.json was not produced.' \
              'The JSON reporter output path is misconfigured or the eval run failed before reporting.' \
              > eval-artifact/REPORT_MISSING.txt
            echo "::error::evals/logs/report.json was not produced;" \
              "the JSON reporter path is misconfigured or the eval run failed before reporting."
            echo "report_present=false" >> "$GITHUB_OUTPUT"
          else
            echo "report.json present ($(wc -c < evals/logs/report.json) bytes)"
            echo "report_present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload eval logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        with:
          name: eval-logs-${{ matrix.run_attempt }}
          path: eval-artifact
          retention-days: 7
          if-no-files-found: warn

      - name: Fail when report.json was missing
        if: always() && steps.prepare.outputs.report_present == 'false'
        run: |
          echo "::error::Aggregation cannot proceed: report.json was missing for attempt ${{ matrix.run_attempt }}."
          exit 1
