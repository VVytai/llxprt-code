name: 'On Merge Smoke Test'

on:
  push:
    branches:
      - 'main'
      - 'release/**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'The branch, tag, or SHA to test on.'
        required: false
        type: 'string'
        default: 'main'
      dry-run:
        description: 'Run a dry-run of the smoke test; No bug will be created'
        required: true
        type: 'boolean'
        default: true

jobs:
  smoke-test:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      issues: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8'
        with:
          ref: '${{ github.event.inputs.ref || github.sha }}'
          fetch-depth: 1
      - name: 'Set up Node.js'
        # The runner's default Node 22 ships npm 10.x, which resolves
        # nested lockfile entries (e.g. yaml@2.9.0 under
        # @opentelemetry/configuration) differently than the npm 11.6.2
        # that generated package-lock.json, causing `npm ci` to fail with
        # "Missing: yaml@2.9.0 from lock file". Pinning Node 24 (from
        # .nvmrc) brings npm 11.x and matches every other workflow.
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # ratchet:actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: 'Setup Bun'
        # Must run BEFORE `npm ci`: in a fresh checkout without bundle/llxprt.js,
        # scripts/postinstall.cjs can run `npm run build` and `npm run bundle`,
        # both now Bun-backed, so Bun must be on PATH during `npm ci` or the
        # install fails with `bun: command not found`.
        uses: 'oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76' # ratchet:oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'
          # Disable Bun binary caching in this write-permission job to close
          # the cache-poisoning path flagged by zizmor.
          no-cache: true
      - name: 'Install Dependencies'
        run: 'npm ci'
      # No build step: the checked-in launcher resolves packages/cli/index.ts
      # and execs it with the bundled Bun; no dist/ output is consumed.
      - name: 'Smoke test CLI entry (launcher -> Bun, no Node in chain)'
        run: './packages/cli/bin/llxprt --version'
      - name: 'Create Issue on Failure'
        if: '${{ failure() && github.event.inputs.dry-run == false }}'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          DETAILS_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          REF: '${{ github.event.inputs.ref }}'
        run: |
          gh issue create \
            --title "Smoke test failed on ${REF} @ $(date +'%Y-%m-%d')" \
            --body "Smoke test failed. See the full run for details: ${DETAILS_URL}"
