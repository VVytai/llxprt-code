name: 'Nightly Tests'

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: 'nightly-${{ github.ref }}'
  cancel-in-progress: false

permissions:
  checks: 'write'
  contents: 'read'
  statuses: 'write'

defaults:
  run:
    shell: 'bash'

jobs:
  windows_ci:
    name: 'Windows CI (Nightly)'
    runs-on: '${{ matrix.os }}'
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'windows-latest'
        node-version:
          - '24.x'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5

      - name: 'Set up Node.js ${{ matrix.node-version }}'
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # ratchet:actions/setup-node@v6
        with:
          node-version: '${{ matrix.node-version }}'
          cache: 'npm'

      - name: 'Setup Bun'
        uses: 'oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76' # ratchet:oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: 'Configure Windows Defender exclusions'
        run: |
          Add-MpPreference -ExclusionPath $env:GITHUB_WORKSPACE -Force
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE\node_modules" -Force
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE\packages" -Force
          Add-MpPreference -ExclusionPath "$env:TEMP" -Force
        shell: 'pwsh'

      - name: 'Configure npm for Windows performance'
        run: |
          npm config set progress false
          npm config set audit false
          npm config set fund false
          npm config set loglevel error
          npm config set maxsockets 32
          npm config set registry https://registry.npmjs.org/
        shell: 'pwsh'

      - name: 'Install dependencies for testing'
        run: |-
          npm ci
      - name: 'Build project'
        run: |-
          npm run build

      - name: 'Fix rollup platform dependency'
        run: |-
          # Explicitly install the platform-specific rollup package
          # This is a workaround for https://github.com/npm/cli/issues/4828
          if [ "${{ runner.os }}" == "Linux" ]; then
            npm install @rollup/rollup-linux-x64-gnu --no-save || true
          elif [ "${{ runner.os }}" == "Windows" ]; then
            npm install @rollup/rollup-win32-x64-msvc --no-save || true
          fi
        shell: 'bash'

      - name: 'Generate agents API surface report'
        shell: 'bash'
        run: |-
          npm run lint:agents-api-surface

      - name: 'Limit Vitest forks on Windows'
        if: runner.os == 'Windows'
        run: |
          echo "VITEST_MAX_FORKS=2" >> "$GITHUB_ENV"
          echo "VITEST_MIN_FORKS=1" >> "$GITHUB_ENV"
          echo "VITEST_TEST_TIMEOUT=30000" >> "$GITHUB_ENV"
          echo "VITEST_POOL_TIMEOUT=60000" >> "$GITHUB_ENV"

      - name: 'Run tests and generate reports'
        env:
          # Provider configuration from repository secrets/variables
          OPENAI_API_KEY: ${{ secrets[vars.KEY_VAR_NAME] }}
          OPENAI_API_KEY_2: ${{ secrets[vars.KEY_VAR_NAME_2] }}
          KEY_VAR_NAME: ${{ vars.KEY_VAR_NAME }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          LLXPRT_DEFAULT_MODEL: ${{ vars.LLXPRT_DEFAULT_MODEL }}
          LLXPRT_DEFAULT_PROVIDER: ${{ vars.LLXPRT_DEFAULT_PROVIDER }}
          # Set auth type to provider for API key authentication
          LLXPRT_AUTH_TYPE: provider
          NO_COLOR: true
          # Ensure OAuth tests are skipped in CI (they require browser interaction)
          CI: true
          # Allow OpenAI integration tests to exceed Vitest's 5s default timeout (issue #338)
          VITEST_TEST_TIMEOUT: 15000
        run: 'npm run test'

      - name: 'Run script harness tests (macOS)'
        if: matrix.os == 'macos-latest'
        env:
          CI: true
        run: npm run test:scripts

      - name: 'Smoke test CLI entry (Node -> launcher -> Bun)'
        run: 'node ./packages/cli/bin/llxprt.cjs --version'

      - name: 'Wait for file system sync'
        run: 'sleep 2'

      - name: 'Publish Test Report (for non-forks)'
        if: |-
          ${{ always() && (github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: 'dorny/test-reporter@dc3a92680fcc15842eef52e8c4606ea7ce6bd3f3' # ratchet:dorny/test-reporter@v2
        with:
          name: 'Test Results (Node ${{ matrix.node-version }})'
          path: 'packages/*/junit.xml'
          reporter: 'java-junit'
          fail-on-error: 'false'

      - name: 'Upload Test Results Artifact (for forks)'
        if: |-
          ${{ always() && (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}
        uses: 'actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02' # ratchet:actions/upload-artifact@v4
        with:
          name: 'test-results-fork-${{ matrix.node-version }}-${{ matrix.os }}'
          path: 'packages/*/junit.xml'

      - name: 'Upload coverage reports'
        if: |-
          ${{ always() }}
        uses: 'actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02' # ratchet:actions/upload-artifact@v4
        with:
          name: 'coverage-reports-${{ matrix.node-version }}-${{ matrix.os }}'
          path: 'packages/*/coverage'

  e2e_full:
    name: 'E2E Full - ${{ matrix.os }} - ${{ matrix.sandbox }}'
    runs-on: '${{ matrix.os }}'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: 'ubuntu-latest'
            sandbox: 'sandbox:none'
            node-version: '24.x'
          - os: 'ubuntu-latest'
            sandbox: 'sandbox:docker'
            node-version: '24.x'
          - os: 'macos-latest'
            sandbox: 'sandbox:none'
            node-version: '24.x'
          - os: 'windows-latest'
            sandbox: 'sandbox:none'
            node-version: '24.x'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5

      - name: 'Set up Node.js ${{ matrix.node-version }}'
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # ratchet:actions/setup-node@v6
        with:
          node-version: '${{ matrix.node-version }}'

      - name: 'Configure Windows Defender exclusions'
        if: runner.os == 'Windows'
        run: |
          Add-MpPreference -ExclusionPath $env:GITHUB_WORKSPACE -Force
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE\node_modules" -Force
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE\packages" -Force
          Add-MpPreference -ExclusionPath "$env:TEMP" -Force
        shell: 'pwsh'

      - name: 'Configure npm for Windows performance'
        if: runner.os == 'Windows'
        run: |
          npm config set progress false
          npm config set audit false
          npm config set fund false
          npm config set loglevel error
          npm config set maxsockets 32
          npm config set registry https://registry.npmjs.org/
        shell: 'pwsh'

      - name: 'Install dependencies'
        run: 'npm ci'

      - name: 'Build project'
        run: 'npm run build'

      - name: 'Fix rollup optional dependencies on macOS'
        if: runner.os == 'macOS'
        run: |
          npm cache clean --force

      - name: 'Set up Docker'
        if: "matrix.sandbox == 'sandbox:docker'"
        uses: 'docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435' # ratchet:docker/setup-buildx-action@v3

      - name: 'Run E2E tests'
        if: runner.os != 'Windows'
        env:
          # Provider configuration from repository secrets/variables
          OPENAI_API_KEY: '${{ secrets[vars.KEY_VAR_NAME] }}'
          OPENAI_API_KEY_2: '${{ secrets[vars.KEY_VAR_NAME_2] }}'
          KEY_VAR_NAME: '${{ vars.KEY_VAR_NAME }}'
          OPENAI_BASE_URL: '${{ vars.OPENAI_BASE_URL }}'
          LLXPRT_DEFAULT_MODEL: '${{ vars.LLXPRT_DEFAULT_MODEL }}'
          LLXPRT_DEFAULT_PROVIDER: '${{ vars.LLXPRT_DEFAULT_PROVIDER }}'
          # Set auth type to provider for API key authentication
          LLXPRT_AUTH_TYPE: 'provider'
          KEEP_OUTPUT: 'true'
          VERBOSE: 'true'
          # Force file storage to avoid keytar/libsecret dependency in CI
          LLXPRT_FORCE_FILE_STORAGE: 'true'
        shell: 'bash'
        run: |
          if [[ "${{ matrix.sandbox }}" == "sandbox:docker" ]]; then
            npm run test:integration:sandbox:docker
          else
            npm run test:integration:sandbox:none
          fi

      - name: 'Run E2E tests (Windows)'
        if: runner.os == 'Windows'
        env:
          # Provider configuration from repository secrets/variables
          OPENAI_API_KEY: '${{ secrets[vars.KEY_VAR_NAME] }}'
          OPENAI_API_KEY_2: '${{ secrets[vars.KEY_VAR_NAME_2] }}'
          KEY_VAR_NAME: '${{ vars.KEY_VAR_NAME }}'
          OPENAI_BASE_URL: '${{ vars.OPENAI_BASE_URL }}'
          LLXPRT_DEFAULT_MODEL: '${{ vars.LLXPRT_DEFAULT_MODEL }}'
          LLXPRT_DEFAULT_PROVIDER: '${{ vars.LLXPRT_DEFAULT_PROVIDER }}'
          # Set auth type to provider for API key authentication
          LLXPRT_AUTH_TYPE: 'provider'
          # Force file storage to avoid keytar/libsecret dependency in CI
          LLXPRT_FORCE_FILE_STORAGE: 'true'
          KEEP_OUTPUT: 'true'
          VERBOSE: 'true'
          SANDBOX: '${{ matrix.sandbox }}'
          NODE_OPTIONS: '--max-old-space-size=32768 --max-semi-space-size=256'
          UV_THREADPOOL_SIZE: '32'
          NODE_ENV: 'test'
        shell: 'pwsh'
        run: |
          if ($env:SANDBOX -eq 'sandbox:docker') {
            npm run test:integration:sandbox:docker
          } else {
            npm run test:integration:sandbox:none
          }

  behavioral_evals:
    name: 'Behavioral Evals (Nightly)'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # ratchet:actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci'

      - name: 'Build project'
        run: 'npm run build'

      - name: 'Run behavioral evals'
        env:
          OPENAI_API_KEY: '${{ secrets[vars.KEY_VAR_NAME] }}'
          OPENAI_BASE_URL: '${{ vars.OPENAI_BASE_URL }}'
          LLXPRT_DEFAULT_MODEL: '${{ vars.LLXPRT_DEFAULT_MODEL }}'
          LLXPRT_DEFAULT_PROVIDER: '${{ vars.LLXPRT_DEFAULT_PROVIDER }}'
          LLXPRT_AUTH_TYPE: 'provider'
          LLXPRT_FORCE_FILE_STORAGE: 'true'
          RUN_EVALS: '1'
        run: 'npm run test:all_evals'

  notify_failure:
    name: 'Create Issue on Failure'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    needs:
      - 'windows_ci'
      - 'e2e_full'
      - 'behavioral_evals'
    if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    permissions:
      issues: 'write'
    steps:
      - name: 'Create Issue on Failure'
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          RUN_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          WINDOWS_CI_RESULT: '${{ needs.windows_ci.result }}'
          E2E_FULL_RESULT: '${{ needs.e2e_full.result }}'
          BEHAVIORAL_EVALS_RESULT: '${{ needs.behavioral_evals.result }}'
        shell: 'bash'
        run: |
          set -euo pipefail
          ISSUE_TITLE="Nightly workflow failed"

          ensure_label() {
            local name="$1"
            local color="$2"
            local description="$3"
            local existing=""
            local create_err=""
            # Capture stderr in create_err while discarding stdout; redirect order matters.
            if create_err="$(gh label create "${name}" --color "${color}" --description "${description}" 2>&1 >/dev/null)"; then
              return
            fi
            if ! existing="$(gh label list --search "${name}" --json name --jq ".[] | select(.name == \"${name}\") | .name" 2>&1)"; then
              echo "Failed to check for label: ${name}" >&2
              echo "  create error: ${create_err}" >&2
              echo "  list error: ${existing}" >&2
              return 1
            fi
            if [[ "${existing}" != "${name}" ]]; then
              echo "Failed to create or find label: ${name}" >&2
              echo "  create error: ${create_err}" >&2
              return 1
            fi
          }

          LABEL_ARGS=()
          if ensure_label "ci/cd" "e33539" "Issues with github and the workflow scripts and CI CD environment."; then
            LABEL_ARGS+=(--label "ci/cd")
          else
            echo "Warning: continuing without ci/cd label" >&2
          fi
          if ensure_label "bug" "d73a4a" "Something is not working"; then
            LABEL_ARGS+=(--label "bug")
          else
            echo "Warning: continuing without bug label" >&2
          fi

          FAILED_JOBS=()
          [[ "${WINDOWS_CI_RESULT}" =~ ^(failure|cancelled)$ ]] && FAILED_JOBS+=("windows_ci=${WINDOWS_CI_RESULT}")
          [[ "${E2E_FULL_RESULT}" =~ ^(failure|cancelled)$ ]] && FAILED_JOBS+=("e2e_full=${E2E_FULL_RESULT}")
          [[ "${BEHAVIORAL_EVALS_RESULT}" =~ ^(failure|cancelled)$ ]] && FAILED_JOBS+=("behavioral_evals=${BEHAVIORAL_EVALS_RESULT}")
          if [[ ${#FAILED_JOBS[@]} -eq 0 ]]; then
            echo "No failed or cancelled jobs detected; nothing to report."
            exit 0
          fi
          FAILED_JOBS_TEXT="${FAILED_JOBS[*]}"

          retry_gh() {
            local attempt
            for attempt in 1 2 3 4; do
              if "$@"; then
                return 0
              fi
              if [[ "${attempt}" -lt 4 ]]; then
                echo "Attempt ${attempt} failed, retrying issue notification" >&2
                sleep 5
              fi
            done
            echo "All retries exhausted for: $*" >&2
            return 1
          }

          if ! EXISTING_ISSUE="$(
            retry_gh gh issue list \
              --search "\"${ISSUE_TITLE}\" in:title is:issue state:open sort:created-desc" \
              --limit 30 \
              --json number,title \
              --jq "[.[] | select(.title == \"${ISSUE_TITLE}\") | .number] | .[0] // empty"
          )"; then
            echo "ERROR: Failed to search for existing issues; aborting to avoid duplicates." >&2
            exit 1
          fi

          if [[ -n "${EXISTING_ISSUE}" ]]; then
            retry_gh gh issue comment "${EXISTING_ISSUE}" \
              --body "Nightly workflow failed again on $(date +'%Y-%m-%d'). Affected jobs: ${FAILED_JOBS_TEXT}. Full run: ${RUN_URL}" || {
              echo "ERROR: Failed to comment on existing issue #${EXISTING_ISSUE}" >&2
              exit 1
            }
          elif [[ ${#LABEL_ARGS[@]} -gt 0 ]]; then
            retry_gh gh issue create \
              --title "${ISSUE_TITLE}" \
              --body "The nightly test workflow failed. Affected jobs: ${FAILED_JOBS_TEXT}. Full run: ${RUN_URL}" \
              "${LABEL_ARGS[@]}" || {
              echo "ERROR: Failed to create issue with labels" >&2
              exit 1
            }
          else
            retry_gh gh issue create \
              --title "${ISSUE_TITLE}" \
              --body "The nightly test workflow failed. Affected jobs: ${FAILED_JOBS_TEXT}. Full run: ${RUN_URL}" || {
              echo "ERROR: Failed to create issue without labels" >&2
              exit 1
            }
          fi
